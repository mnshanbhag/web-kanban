<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0c0b10" />
  <title>CanBan</title>
  <script>
    document.documentElement.dataset.theme = localStorage.getItem("canban-theme") || "dark";
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand-group">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none">
            <rect x="2.5" y="2.5" width="6" height="19" rx="2" fill="white" fill-opacity="0.95"/>
            <rect x="9.5" y="2.5" width="6" height="12" rx="2" fill="white" fill-opacity="0.65"/>
            <rect x="16.5" y="2.5" width="5" height="16" rx="2" fill="white" fill-opacity="0.4"/>
          </svg>
        </span>
        <h1>Can<span class="brand-accent">Ban</span></h1>
      </div>
      <p class="brand-tagline">Flow, refined.</p>
    </div>
    <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Switch theme" title="Switch theme">
      <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
      </svg>
      <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </header>

  <main class="board" id="board">
    <section class="column" data-column="To Do">
      <div class="column-header">
        <h2>To Do</h2>
        <span class="count" id="count-To Do">0</span>
      </div>
      <div class="task-list" data-column="To Do"></div>
      <button class="add-task-btn" data-column="To Do">+ Add Task</button>
    </section>

    <section class="column" data-column="In Progress">
      <div class="column-header">
        <h2>In Progress</h2>
        <span class="count" id="count-In Progress">0</span>
      </div>
      <div class="task-list" data-column="In Progress"></div>
      <button class="add-task-btn" data-column="In Progress">+ Add Task</button>
    </section>

    <section class="column" data-column="In Review">
      <div class="column-header">
        <h2>In Review</h2>
        <span class="count" id="count-In Review">0</span>
      </div>
      <div class="task-list" data-column="In Review"></div>
      <button class="add-task-btn" data-column="In Review">+ Add Task</button>
    </section>

    <section class="column" data-column="Done">
      <div class="column-header">
        <h2>Done</h2>
        <span class="count" id="count-Done">0</span>
      </div>
      <div class="task-list" data-column="Done"></div>
      <button class="add-task-btn" data-column="Done">+ Add Task</button>
    </section>
  </main>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3>New Task</h3>
      <form id="task-form">
        <label for="task-title">Title</label>
        <input type="text" id="task-title" required maxlength="120" placeholder="e.g. Write documentation" />

        <label for="task-description">Description</label>
        <textarea id="task-description" rows="4" placeholder="Optional details..."></textarea>

        <label for="task-column">Column</label>
        <select id="task-column">
          <option value="To Do">To Do</option>
          <option value="In Progress">In Progress</option>
          <option value="In Review">In Review</option>
          <option value="Done">Done</option>
        </select>

        <label for="task-priority">Priority</label>
        <select id="task-priority">
          <option value="Low">Low</option>
          <option value="Medium" selected>Medium</option>
          <option value="High">High</option>
          <option value="Urgent">Urgent</option>
        </select>

        <div id="task-blocked-by-field" class="hidden">
          <label for="task-blocked-by">Blocked by (task ID)</label>
          <input type="text" id="task-blocked-by" placeholder="e.g. KAN-02" />
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn-primary">Add Task</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="task-detail-modal-overlay">
    <div class="modal task-detail-modal">
      <div class="task-detail-header">
        <span class="card-id" id="detail-id"></span>
        <h3 id="detail-title"></h3>
      </div>
      <p class="task-detail-description" id="detail-description"></p>
      <div class="card-tags" id="detail-tags"></div>
      <form id="task-detail-form">
        <div id="detail-blocked-by-field">
          <label for="detail-blocked-by">Blocked by (task ID)</label>
          <input type="text" id="detail-blocked-by" placeholder="e.g. KAN-02, or leave empty" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="task-detail-close">Close</button>
          <button type="submit" class="btn-primary" id="detail-save-btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="error-toast"></div>

  <button class="trash-fab" id="trash-fab" title="Recycle Bin" aria-label="Recycle Bin">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"></polyline>
      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
      <path d="M10 11v6"></path>
      <path d="M14 11v6"></path>
      <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
    </svg>
    <span class="trash-badge hidden" id="trash-badge">0</span>
  </button>

  <div class="modal-overlay" id="trash-modal-overlay">
    <div class="modal trash-modal">
      <div class="trash-modal-header">
        <h3>Recycle Bin</h3>
        <button type="button" class="btn-secondary danger" id="empty-trash-btn">Empty Trash</button>
      </div>
      <div class="trash-list" id="trash-list"></div>
      <p class="trash-empty-message hidden" id="trash-empty-message">Recycle bin is empty.</p>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="trash-modal-close">Close</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="confirm-modal-overlay">
    <div class="modal">
      <h3>Are you sure?</h3>
      <p id="confirm-message"></p>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="confirm-cancel">Cancel</button>
        <button type="button" class="btn-primary danger" id="confirm-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
